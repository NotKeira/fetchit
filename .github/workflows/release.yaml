name: Release
on:
  push:
    tags:
      - "v*-rc*"
permissions:
  contents: write
jobs:
  build-linux:
    name: Build for Linux (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: debian-11
            container: debian:11
          - os: debian-12
            container: debian:12
          - os: debian-13
            container: debian:trixie
          - os: ubuntu-20.04
            container: ubuntu:20.04
          - os: ubuntu-22.04
            container: ubuntu:22.04
          - os: ubuntu-24.04
            container: ubuntu:24.04
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y gcc make git
      - name: Build
        run: make
      - name: Create archive
        run: |
          mkdir -p dist
          tar -czf dist/fetchit-${{ matrix.os }}-amd64.tar.gz fetchit
      - uses: actions/upload-artifact@v7
        with:
          name: fetchit-${{ matrix.os }}-amd64
          path: dist/fetchit-${{ matrix.os }}-amd64.tar.gz
  release:
    name: Create release
    needs:
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: dist/**/*.tar.gz
          generate_release_notes: true